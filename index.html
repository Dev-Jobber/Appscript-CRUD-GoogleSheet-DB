<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- Page Header -->
    <header class="page-header">
        <div class="header-content">
            <h1>User Management</h1>
            <p>Admin Dashboard & Database Control</p>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- Message Area -->
        <div id="messageArea" class="message-area"></div>

        <!-- User Form Card -->
        <section class="card form-card">
            <div class="card-header">
                <h2 id="formTitle">Add New User</h2>
            </div>
            <form id="userForm" class="modern-form">
                <input type="hidden" id="userId">

                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="e.g. john@company.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="e.g. +1 (555) 000-0000" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Access Level</label>
                        <select id="role" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                            <option value="manager">Manager</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="status">Account Status</label>
                    <select id="status" required>
                        <option value="">Set Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="blocked">Blocked</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-ghost" style="display: none;">Cancel</button>
                    <button type="submit" id="saveBtn" class="btn btn-primary">Create User</button>
                    <button type="button" id="updateBtn" class="btn btn-primary" style="display: none;">Update User</button>
                </div>
            </form>
        </section>

        <!-- User List Table -->
        <section class="card table-section">
            <div class="card-header">
                <h2>Active Directory</h2>
            </div>
            <div class="table-wrapper">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <!-- Adjusted to match the exactly 8 <td> elements from JS -->
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>

                <div id="loadingSpinner" class="loading" style="display: none;">
                    <div class="spinner"></div>
                </div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <p>No records found in the directory.</p>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
